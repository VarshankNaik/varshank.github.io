<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Varshank Naik</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0e0e0e;
        color: #f0ece4;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Jost", sans-serif;
      }

      .center {
        text-align: center;
        animation: rise 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(3.5rem, 12vw, 8rem);
        letter-spacing: 0.04em;
        line-height: 1;
        color: #f0ece4;
      }

      .line {
        width: 50px;
        height: 1px;
        background: #c8a97e;
        margin: 1.5rem auto;
        animation: grow 1s 0.5s ease both;
      }

      @keyframes grow {
        from {
          width: 0;
          opacity: 0;
        }
        to {
          width: 50px;
          opacity: 1;
        }
      }

      .sub {
        font-family: "Jost", sans-serif;
        font-weight: 200;
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #7a7670;
        animation: rise 1s 0.6s ease both;
      }
    </style>
  </head>
  <body>
    <div class="center">
      <h1>Varshank Naik</h1>
      <div class="line"></div>
      <p class="sub">varshanknaik.github.io</p>
    </div>
  </body>
</html>
